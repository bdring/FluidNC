; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = FluidNC/src
include_dir = FluidNC/include
test_dir = FluidNC/tests
data_dir = FluidNC/data-rp2040
default_envs = wifi
extra_configs=
    platformio_override.ini
    ;debug.ini

[common_env_data]
lib_deps_builtin = 
    SPI

[common]
build_flags = 
    !python git-version.py
    -D__FLUIDNC
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ASYNC_TCP_MAX_ACK_TIME=5000
    -DCONFIG_ASYNC_TCP_PRIORITY=10
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=64
    -DWS_MAX_QUEUED_MESSAGES=32 ; 256 is no longer needed, and could be set to default of 32 if memory is an issue
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0 ; Which core is best to use for async tcp? If the main stepper control loop is running on core 1, I think it should be 0...
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192
    -DASYNCWEBSERVER_LOG_LEVEL=ASYNC_WS_LOG_NONE ; this may require CORE_DEBUG_LEVEL to be higher as well
    -DASYNCWEBSERVER_USE_CHUNK_INFLIGHT=1
    -Wno-unused-variable
    -Wno-unused-function
lib_deps =
    TMCStepper@>=0.7.0,<1.0.0

bt_deps =
    BluetoothSerial
wifi_deps =
    ; ESP32Async/AsyncTCP
    ; This specific commit has the bug fix to support uploading zero byte files, should be released soon in their official
    ;fork that adds WebDAV methods
    ESPAsyncWebServer=https://github.com/MitchBradley/ESPAsyncWebServer.git#WebDAV
    ;upstream version
    ;ESPAsyncWebServer=https://github.com/ESP32Async/ESPAsyncWebServer.git
    ;WiFi=https://github.com/MitchBradley/WiFi#canWrite
    ; If we include the following explicit dependencies when we get the
    ; Arduino framework code from github, platformio picks up different
    ; and incompatible versions of these libraries from who knows where, 
    ; ArduinoOTA
    ; DNSServer
    ; ESPmDNS
    ; Update
    ; WebServer
    ; WiFi
    ; WiFiClientSecure

[common_esp32_base]
platform = https://github.com/platformio/platform-espressif32.git
framework = arduino
platform_packages = platformio/framework-arduinoespressif32@^3.20017.241212
board_build.arduino.upstream_packages = no

upload_speed = 921600
board_build.partitions = min_littlefs.csv ; For 4M ESP32
board_build.filesystem = littlefs
; board_build.partitions = FluidNC/ld/esp32/app3M_spiffs1M_8MB.csv  ; For 8Meg ESP32
; board_build.partitions = FluidNC/ld/esp32/app3M_spiffs9M_16MB.csv ; For 16Meg ESP32
monitor_speed = 115200
monitor_flags = 
    --eol=LF
monitor_filters=esp32_exception_decoder
board_build.f_flash = 80000000L
build_unflags = -std=gnu++11
build_flags =
    ${common.build_flags} -std=gnu++17 -D_GLIBCXX_HAVE_DIRENT_H
    -IFluidNC/esp32
; -lstdc++fs
build_src_filter =
    +<**/*.h> +<**/*.s> +<**/*.S> +<**/*.cpp> +<**/*.c>
    +<../stdfs>
    -<WebUI>
    -<BTConfig.cpp>
    ; -<OLED.cpp>

lib_extra_dirs = 
    libraries
lib_deps =
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@4.4.1

[common_esp32]
extends = common_esp32_base
    FluidNC/ld/esp32/vtable_in_dram.py
board = esp32dev
build_src_filter =
    ${common_esp32_base.build_src_filter}
    +<../esp32/*.c>
    +<../esp32/*.cpp>
    +<../esp32/esp32/*.c>
    +<../esp32/esp32/*.cpp>
build_flags =
    ${common_esp32_base.build_flags}
    -IFluidNC/esp32/esp32
    -DMCU=\"esp32\"

[common_esp32s3]
extends = common_esp32_base
extra_scripts =
    FluidNC/ld/esp32s3/vtable_in_dram.py
board = esp32-s3-devkitc-1
build_src_filter =
    ${common_esp32_base.build_src_filter}
    +<../esp32/*.c>
    +<../esp32/*.cpp>
    +<../esp32/esp32s3/*.c>
    +<../esp32/esp32s3/*.cpp>
    -<../esp32/esp32s3/USBCDCChannel_IDF.cpp>
build_flags =
    ${common_esp32_base.build_flags}
    -IFluidNC/esp32/esp32s3
    ; -DBOARD_HAS_PSRAM
    -DMCU=\"esp32s3\"
debug_tool = esp-builtin

[common_wifi]
build_src_filter = +<WebUI>
build_flags =
    -DVARIANT=\"wifi\"

[common_bt]
build_src_filter = +<BTConfig.cpp> +<WebUI/WebCommands.cpp>
build_flags = -DVARIANT=\"bt\"

[common_noradio]
build_src_filter =
build_flags = -DVARIANT=\"noradio\"

[env:debug]
extends = common_esp32
build_type = debug
lib_deps = ${common.lib_deps}

[env:noradio]
extends = common_esp32
lib_deps =
    ${common.lib_deps}
    ${common_esp32_base.lib_deps}
build_src_filter =
    ${common_esp32.build_src_filter}
    ${common_esp32.build_src_filter}
build_flags =
    ${common_esp32.build_flags}
    ${common_noradio.build_flags}

[env:wifi]
extends = common_esp32
lib_deps =
    ${common.lib_deps}
    ${common_esp32_base.lib_deps}
    ${common.wifi_deps}
build_src_filter =
    ${common_esp32.build_src_filter}
    ${common_wifi.build_src_filter}
build_flags =
    ${common_esp32.build_flags}
    ${common_wifi.build_flags}
    -DDISABLE_ARDUINO_OTA

[env:bt]
extends = common_esp32
lib_deps =
    ${common.lib_deps}
    ${common_esp32_base.lib_deps}
    ${common.bt_deps}
build_src_filter =
    ${common_esp32.build_src_filter}
    ${common_bt.build_src_filter}
build_flags =
    ${common_esp32.build_flags}
    ${common_bt.build_flags}

[env:noradio_s3]
extends = common_esp32s3
lib_deps =
    ${common.lib_deps}
    ${common_esp32_base.lib_deps}
    ${common.lib_deps}
build_src_filter =
    ${common_esp32s3.build_src_filter}
    ${common_noradio.build_src_filter}
build_flags =
    ${common_esp32s3.build_flags}
    ${common_noradio.build_flags}

[env:wifi_s3]
extends = common_esp32s3
lib_deps =
    ${common.lib_deps}
    ${common_esp32_base.lib_deps}
    ${common.wifi_deps}
build_src_filter =
    ${common_esp32s3.build_src_filter}
    ${common_wifi.build_src_filter}
build_flags =
    ${common_esp32s3.build_flags}
    ${common_wifi.build_flags}

# ==========================================
# RP2040 (Raspberry Pi Pico) Configuration
# ==========================================

[common_pico_base]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
;platform_packages = platformio/toolchain-gccarmnoneeabi@1.140201.0
board_build.core = earlephilhower
board_build.f_cpu = 125000000L
; board_build.boot2 = vendor/boot2_generic_03h_4_padded_checksum
; board_build.usb_mode = usb_only
board_build.usb_stack = tinyusb
; board_build.usb_stack = picosdk
build_flags =
    ${common.build_flags}
    -std=c++17
    -fexceptions
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_FREERTOS
    -D_GLIBCXX_HAVE_DIRENT_H
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_EXCEPTIONS
    -IFluidNC/rp2040
    -IFluidNC/stdfs17/include
    -DNVS_FLASH_OFFSET=0x1FF000
    -DNVS_SECTOR_SIZE=0x1000
    -D_GLIBCXX_HAVE_SYS_STATVFS_H
    -fstack-protector
    ; -DDEBUG_RP2040_PORT=Serial
build_src_filter =
    +<**/*.h> +<**/*.s> +<**/*.S> +<**/*.cpp> +<**/*.c>
    +<../rp2040/*.c>
    +<../rp2040/*.cpp>
    +<../stdfs17>
    -<../rp2040/ws2812.c>
    -<WebUI>
    -<BTConfig.cpp>
    -<Motors/Trinamic*.cpp>
    -<Motors/TMC*.cpp>
    -<I2SOut.cpp>
    -<Pins/DebugPinDetail.cpp>
    -<OLED*.cpp>
    -<SSD1306_I2C.cpp>
build_unflags =
    -std=gnu++11
    -std=gnu++14
    -fno-exceptions
lib_extra_dirs =
    libraries
lib_deps =
    ${common.lib_deps}

monitor_speed = 115200
upload_protocol = picoprobe
debug_tool = picoprobe
debug_init_break = main
; debug_extra_cmds = continue
debug_speed = 10000
upload_flags =
extra_scripts =
    pre:FluidNC/rp2040/patch_arduinopico.py
    post:FluidNC/rp2040/preserve_nvs.py

[common_rp2040_base]
extends = common_pico_base
board = waveshare_rp2040_zero
board_build.mcu = rp2040
board_build.filesystem_size = 60k
build_flags =
    ${common_pico_base.build_flags}
    -DMCU=\"rp2040\"
    ; -Wl,-Map=rp2040.map
build_unflags =
    ${common_pico_base.build_unflags}
    -IFluidNC/src/WebUI

[env:rp2040_noradio]
extends = common_rp2040_base
; board = pico
lib_deps = ${common_rp2040_base.lib_deps}
build_flags =
    ${common_rp2040_base.build_flags}
    -DVARIANT=\"noradio\"

[env:rp2040_wifi]
extends = common_rp2040_base
board = rpipicow
lib_deps =
    ${common_rp2040_base.lib_deps}
    ESPAsyncWebServer=https://github.com/MitchBradley/ESPAsyncWebServer.git#WebDAV
    ; ${common.wifi_deps} ; not needed
build_src_filter =
    ${common_rp2040_base.build_src_filter}
    ${common_wifi.build_src_filter}
    ; -<WebUI/WifiConfig.cpp>
build_flags =
    ${common_rp2040_base.build_flags}
    ${common_wifi.build_flags}
    -DCYW43_ARCH_CYW43_USE_SPI=1

[common_rp2350_base]
extends = common_pico_base
board_build.filesystem_size = 160k
build_flags =
    ${common_pico_base.build_flags}
    -DMCU=\"rp2350\"
    -Wl,-Map=$BUILD_DIR/firmware.map

[env:rp2350_noradio]
extends = common_rp2350_base
board = rpipico2
lib_deps = ${common_rp2350_base.lib_deps}
build_flags =
    ${common_rp2350_base.build_flags}
    -DVARIANT=\"noradio\"
    -Wl,--wrap=tud_cdc_line_coding_cb
    ; -DUSING_TINYUSB=1

[env:rp2350_wifi]
extends = common_rp2350_base
board = rpipico2w
upload_protocol = picotool
debug_tool = cmsis-dap
debug_build_flags =
    -O2
    -g3
    -ggdb3
lib_deps =
    ${common_rp2350_base.lib_deps}
    ; ${common.wifi_deps}
    ESPAsyncWebServer=https://github.com/MitchBradley/ESPAsyncWebServer.git#WebDAV
build_src_filter =
    ${common_rp2350_base.build_src_filter}
    ${common_wifi.build_src_filter}
    ; -<WebUI/WifiConfig.cpp>
build_flags =
    ${common_rp2350_base.build_flags}
    ${common_wifi.build_flags}
    -DCYW43_ARCH_CYW43_USE_SPI=1
    -Wl,--wrap=tud_cdc_line_coding_cb
    ;-UNDEBUG
    ;-DCYW43_VERBOSE_DEBUG=1
    ; -DUSING_TINYUSB=1


[env:windows_x86]
lib_ldf_mode = chain
;platform = https://github.com/platformio/platform-windows_x86.git
platform = windows_x86
test_build_src = true
build_src_filter =
    +<**/*.h> +<**/*.s> +<**/*.S> +<**/*.cpp> +<**/*.c>
    +<../capture>
    +<../win32>
    -<I2SOut.cpp>
    -<Machine/I2CBus.cpp>
    -<BTConfig.cpp>
    -<Motors/Trinamic*.cpp>
    -<Motors/TMC*.cpp>
    -<Motors/*Servo.cpp>
    -<Motors/Dynamixel2.cpp>
    -<Motors/Solenoid.cpp>
    -<Pins/DebugPinDetail.cpp>
    -<WebUI>
    -<OLED*.cpp>
    -<SSD1306_I2C.cpp>
build_flags =
    -std=gnu++17
    -mconsole
    -lcomdlg32
    -limagehlp
    -lpsapi
    -IFluidNC/capture
    -IFluidNC/win32
    -DMCU=\"windows\"
    -DVARIANT=\"capture\"
lib_compat_mode = off

[env:posix]
lib_ldf_mode = chain
platform = native
test_build_src = true
build_src_filter =
    +<**/*.h> +<**/*.s> +<**/*.S> +<**/*.cpp> +<**/*.c>
    +<../capture>
    +<../posix>
    -<I2SOut.cpp>
    -<Machine/I2CBus.cpp>
    -<BTConfig.cpp>
    -<Motors/Trinamic*.cpp>
    -<Motors/TMC*.cpp>
    -<Motors/*Servo.cpp>
    -<Motors/Dynamixel2.cpp>
    -<Motors/Solenoid.cpp>
    -<Pins/DebugPinDetail.cpp>
    -<WebUI>
    -<OLED*.cpp>
    -<SSD1306_I2C.cpp>
    -<Spindles/VFD/*>
    +<Spindles/VFD/VFDProtocol.cpp>
    +<Spindles/VFD/GenericProtocol.cpp>
    # -<Spindles/VFDSpindle.cpp>
build_flags =
    -g
    -std=c++20
    -IFluidNC/capture
    -IFluidNC/posix
    -lpthread
    -DMCU=\"posix\"
    -DVARIANT=\"capture\"
lib_compat_mode = off

# The following are for "pio test"
# Note: The [env:native] environment was renamed to [env:windows_x86]
# Use 'pio test -e tests' or 'pio test -e tests_coverage' instead
[tests_common]
platform = native
test_framework = googletest
test_build_src = true
build_src_filter =
    +<Configuration/Completer.cpp>
    +<Pins/PinOptionsParser.cpp>
    +<string_util.cpp>
    +<UTF8.cpp>
    +<Regexpr.cpp>
    +<Error.cpp>
    +<FluidError.cpp>
    +<test_main.cpp>
    +<tests/StringUtilTest.cpp>
    +<tests/UTF8Test.cpp>
    +<tests/UtilityTest.cpp>
    +<tests/RegexprTest.cpp>
    +<tests/ErrorBehaviorTest.cpp>
    +<tests/StateTest.cpp>
    +<tests/CommandCompletionTest.cpp>
    +<tests/FluidErrorTest.cpp>
build_flags = -std=c++17 -g -IFluidNC/capture
lib_compat_mode = off
lib_deps =
    google/googletest @ ^1.15.2

# Standard test environment - no sanitizers, no coverage
[env:tests]
extends = tests_common

# Coverage environment - generates .gcda/.gcno files for gcovr/lcov
# Usage:
#   pio test -e tests_coverage
#   python coverage.py
[env:tests_coverage]
extends = tests_common
build_flags = ${tests_common.build_flags} -O0 --coverage
extra_scripts = coverage_build.py
