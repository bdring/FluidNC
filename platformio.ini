; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = FluidNC/src
include_dir = FluidNC/include
test_dir = FluidNC/tests
data_dir = FluidNC/data
default_envs = wifi
extra_configs=
    platformio_override.ini
    ;debug.ini

[common_env_data]
lib_deps_builtin = 
	SPI

[common]
build_flags = 
	!python git-version.py
	-DCORE_DEBUG_LEVEL=0
  	-DCONFIG_ASYNC_TCP_MAX_ACK_TIME=5000
  	-DCONFIG_ASYNC_TCP_PRIORITY=10
  	-DCONFIG_ASYNC_TCP_QUEUE_SIZE=64
	-DWS_MAX_QUEUED_MESSAGES=32 ; 256 is no longer needed, and could be set to default of 32 if memory is an issue
  	-DCONFIG_ASYNC_TCP_RUNNING_CORE=0 ; Which core is best to use for async tcp? If the main stepper control loop is running on core 1, I think it should be 0...
  	-DCONFIG_ASYNC_TCP_STACK_SIZE=8192
	-DASYNCWEBSERVER_LOG_LEVEL=ASYNC_WS_LOG_NONE ; this may require CORE_DEBUG_LEVEL to be higher as well
	-DASYNCWEBSERVER_USE_CHUNK_INFLIGHT=1
	-Wno-unused-variable
	-Wno-unused-function
lib_deps =
	TMCStepper@>=0.7.0,<1.0.0
	thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@4.4.1
bt_deps =
	BluetoothSerial
wifi_deps =
	ESP32Async/AsyncTCP
	ESPAsyncWebServer=https://github.com/ESP32Async/ESPAsyncWebServer.git
	;WiFi=https://github.com/MitchBradley/WiFi#canWrite
        ; If we include the following explicit dependencies when we get the
        ; Arduino framework code from github, platformio picks up different
        ; and incompatible versions of these libraries from who knows where, 
	; ArduinoOTA
	; DNSServer
	; ESPmDNS
	; Update
	; WebServer
	; WiFi
	; WiFiClientSecure

[common_esp32_base]
platform = https://github.com/platformio/platform-espressif32.git
framework = arduino
platform_packages = platformio/framework-arduinoespressif32@^3.20017.241212
board_build.arduino.upstream_packages = no

upload_speed = 921600
board_build.partitions = min_littlefs.csv ; For 4M ESP32
board_build.filesystem = littlefs
; board_build.partitions = FluidNC/ld/esp32/app3M_spiffs1M_8MB.csv  ; For 8Meg ESP32
; board_build.partitions = FluidNC/ld/esp32/app3M_spiffs9M_16MB.csv ; For 16Meg ESP32
monitor_speed = 115200
monitor_flags = 
	--eol=LF
monitor_filters=esp32_exception_decoder
board_build.f_flash = 80000000L
build_unflags = -std=gnu++11
build_flags =
    ${common.build_flags} -std=gnu++17 -D_GLIBCXX_HAVE_DIRENT_H -D__FLUIDNC
    -IFluidNC/esp32
; -lstdc++fs
build_src_filter =
	+<**/*.h> +<**/*.s> +<**/*.S> +<**/*.cpp> +<**/*.c>
        +<../stdfs>
        -<WebUI>
        -<Pins/WSChannelPinDetail.cpp>
        -<BTConfig.cpp>
        ; -<OLED.cpp>

lib_extra_dirs = 
	libraries

[common_esp32]
extends = common_esp32_base
    FluidNC/ld/esp32/vtable_in_dram.py
board = esp32dev
build_src_filter =
    ${common_esp32_base.build_src_filter}
    +<../esp32/*.c>
    +<../esp32/*.cpp>
    +<../esp32/esp32/*.c>
    +<../esp32/esp32/*.cpp>
build_flags =
    ${common_esp32_base.build_flags}
    -IFluidNC/esp32/esp32
    -DMCU=\"esp32\"

[common_esp32s3]
extends = common_esp32_base
extra_scripts =
    FluidNC/ld/esp32s3/vtable_in_dram.py
board = esp32-s3-devkitc-1
build_src_filter =
    ${common_esp32_base.build_src_filter}
    +<../esp32/*.c>
    +<../esp32/*.cpp>
    +<../esp32/esp32s3/*.c>
    +<../esp32/esp32s3/*.cpp>
    -<../esp32/esp32s3/USBCDCChannel_IDF.cpp>
build_flags =
    ${common_esp32_base.build_flags}
    -IFluidNC/esp32/esp32s3
    ; -DBOARD_HAS_PSRAM
    -DMCU=\"esp32s3\"
debug_tool = esp-builtin

[common_wifi]
build_src_filter = +<WebUI> +<Pins/WSChannelPinDetail.cpp>
build_flags = -DVARIANT=\"wifi\" -DENABLE_WS_CHANNEL_PINS

[common_bt]
build_src_filter = +<BTConfig.cpp> +<WebUI/WebCommands.cpp>
build_flags = -DVARIANT=\"bt\"

[common_noradio]
build_src_filter =
build_flags = -DVARIANT=\"noradio\"

[env:debug]
extends = common_esp32
build_type = debug
lib_deps = ${common.lib_deps}

[env:noradio]
extends = common_esp32
lib_deps = ${common.lib_deps}
build_src_filter =
    ${common_esp32.build_src_filter}
    ${common_esp32.build_src_filter}
build_flags =
    ${common_esp32.build_flags}
    ${common_noradio.build_flags}

[env:wifi]
extends = common_esp32
lib_deps = ${common.lib_deps} ${common.wifi_deps}
build_src_filter =
    ${common_esp32.build_src_filter}
    ${common_wifi.build_src_filter}
build_flags =
    ${common_esp32.build_flags}
    ${common_wifi.build_flags}

[env:bt]
extends = common_esp32
lib_deps = ${common.lib_deps} ${common.bt_deps}
build_src_filter =
    ${common_esp32.build_src_filter}
    ${common_bt.build_src_filter}
build_flags =
    ${common_esp32.build_flags}
    ${common_bt.build_flags}

[env:noradio_s3]
extends = common_esp32s3
lib_deps = ${common.lib_deps}
build_src_filter =
    ${common_esp32s3.build_src_filter}
    ${common_noradio.build_src_filter}
build_flags =
    ${common_esp32s3.build_flags}
    ${common_noradio.build_flags}

[env:wifi_s3]
extends = common_esp32s3
lib_deps = ${common.lib_deps} ${common.wifi_deps}
build_src_filter =
    ${common_esp32s3.build_src_filter}
    ${common_wifi.build_src_filter}
build_flags =
    ${common_esp32s3.build_flags}
    ${common_wifi.build_flags}

[env:windows_x86]
lib_ldf_mode = chain
;platform = https://github.com/platformio/platform-windows_x86.git
platform = windows_x86
test_build_src = true
build_src_filter =
    +<**/*.h> +<**/*.s> +<**/*.S> +<**/*.cpp> +<**/*.c>
    +<../capture>
    +<../win32>
    -<I2SOut.cpp>
    -<Machine/I2CBus.cpp>
    -<BTConfig.cpp>
    -<Motors/Trinamic*.cpp>
    -<Motors/TMC*.cpp>
    -<Motors/*Servo.cpp>
    -<Motors/Dynamixel2.cpp>
    -<Motors/Solenoid.cpp>
    -<Pins/DebugPinDetail.cpp>
    -<WebUI>
    -<OLED*.cpp>
    -<SSD1306_I2C.cpp>
build_flags =
	-std=gnu++17
	-mconsole
	-lcomdlg32
	-limagehlp
	-lpsapi
	-IFluidNC/capture
	-IFluidNC/win32
        -DMCU=\"win32\"
        -DVARIANT=\"capture\"
lib_compat_mode = off

[env:posix]
extra_scripts =  pre:filter_lib_test.py
lib_deps =
        https://github.com/pschatzmann/Arduino-Emulator.git#main
        ArduinoBearSSL
        https://github.com/MitchBradley/PosixAsyncTCP.git
        ; https://github.com/MitchBradley/ESPAsyncWebServer.git#Hosted
        ../libhacks/ESPAsyncWebServer
; PosixAsyncTCP targets native/HOST; disable compatibility filtering so PlatformIO
; keeps and links the package in this environment.
lib_compat_mode = off
lib_ldf_mode = deep
platform = native
test_build_src = true
build_src_filter =
    +<**/*.h> +<**/*.s> +<**/*.S> +<**/*.cpp> +<**/*.c>
    +<../capture>
    -<../capture/arduino>
    +<../posix>
    +<../posix/ESPAsyncWebServer>
    -<I2SOut.cpp>
    -<Machine/I2CBus.cpp>
    -<BTConfig.cpp>
    -<Motors/Trinamic*.cpp>
    -<Motors/TMC*.cpp>
    -<Motors/*Servo.cpp>
    -<Motors/Dynamixel2.cpp>
    -<Motors/Solenoid.cpp>
    -<Pins/DebugPinDetail.cpp>
    -<WebUI/OTA.cpp>
    -<WebUI/Mdns.cpp>
    -<WebUI/NotificationsService.cpp>
    -<WebUI/WifiConfig.cpp>
    -<OLED*.cpp>
    -<SSD1306_I2C.cpp>
    -<Spindles/VFD/*>
    +<Spindles/VFD/VFDProtocol.cpp>
    +<Spindles/VFD/GenericProtocol.cpp>
    +<WebUI/WSChannel.cpp>
    # -<Spindles/VFDSpindle.cpp>
build_flags =
    -Wno-vla-extension
    -Wno-deprecated-declarations
    -O
    -g
    -std=c++20
    -IFluidNC/posix
    -IFluidNC/capture
    -lpthread
    -DASYNCWEBSERVER_LOG_LEVEL=5
    -DARDUINO
    -DHOST
    -DMCU=\"posix\"
    -DVARIANT=\"capture\"
    -DSKIP_HARDWARE_SETUP=ON
    -I.pio/libdeps/posix/Arduino-Emulator/ArduinoCore-API
    -I.pio/libdeps/posix/Arduino-Emulator/ArduinoCore-API
    -I.pio/libdeps/posix/Arduino-Emulator/ArduinoCore-API/api/deprecated
    -I.pio/libdeps/posix/Arduino-Emulator/ArduinoCore-Linux/cores/arduino/
    -I.pio/libdeps/posix/Arduino-Emulator/ArduinoCore-Linux/libraries/MD5Builder/src

    -Iposixlibs/ArduinoBearSSL/src
    -DPOSIX
    -DARDUINO_DISABLE_ECCX08

