## IDF Component Manager Manifest File
## USB host components are linked for all ESP32-S3 builds (runtime YAML config selects mode).
dependencies:
  esp32async/espasyncwebserver:
    version: ^3.8.1
    require: public
    pre_release: true
  esp32async/asynctcp:
    require: public
    version: ^3.4.8
  espressif/esp_tinyusb: "^2.0.1"
  espressif/usb_host_uvc: "^2.3.1"
  espressif/usb_host_vcp: "^1.0.0"
  espressif/usb_host_cdc_acm: "^2.0.0"
  espressif/usb_host_ch34x_vcp: "^2.2.0"
  espressif/usb_host_cp210x_vcp: "^2.0.0"
  espressif/usb_host_ftdi_vcp: "^2.0.0"
  ## Required IDF version
  idf:
    version: ">=5.0.0,<5.9.9"
