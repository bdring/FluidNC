    https://github.com/pschatzmann/Arduino-Emulator.git
    ArduinoBearSSL
    https://github.com/MitchBradley/PosixAsyncTCP.git
    https://github.com/MitchBradley/ESPAsyncWebServer.git#Hosted
; PosixAsyncTCP targets native/HOST; disable compatibility filtering so PlatformIO
; keeps and links the package in this environment.
lib_compat_mode = off
lib_ldf_mode = chain
platform = native
test_build_src = true
build_src_filter =
    +<**/*.h> +<**/*.s> +<**/*.S> +<**/*.cpp> +<**/*.c>
    +<../capture>
    -<../capture/arduino>
    +<../posix>
    -<I2SOut.cpp>
    -<Machine/I2CBus.cpp>
    -<BTConfig.cpp>
    -<Motors/Trinamic*.cpp>
    -<Motors/TMC*.cpp>
    -<Motors/*Servo.cpp>
    -<Motors/Dynamixel2.cpp>
    -<Motors/Solenoid.cpp>
    -<Pins/DebugPinDetail.cpp>
    -<WebUI/OTA.cpp>
    -<WebUI/Mdns.cpp>
    -<WebUI/NotificationsService.cpp>
    -<WebUI/WifiConfig.cpp>
    -<OLED*.cpp>
    -<SSD1306_I2C.cpp>
    -<Spindles/VFD/*>
    +<Spindles/VFD/VFDProtocol.cpp>
    +<Spindles/VFD/GenericProtocol.cpp>
    +<WebUI/WSChannel.cpp>
    # -<Spindles/VFDSpindle.cpp>
build_unflags=
    -m32
    -I/usr/include
    -I/usr/local/include
    -mlittle-endian
    -mabi=lp64
    -mcpu=generic
build_flags =
    -D__SDCC
    -B.pio/pio_tools/
    -B/usr/libexec/gcc-cross/x86_64-linux-gnu/14
    -march=x86-64
    -msse2
    -msse4.1
    -maes
    -mpclmul
    -D__x86_64__
    ; -D__LP64__
    -nostdinc++
    ; Base C++ header
    ; -isystem /usr/include/c++/14
    ; Target bits (parent of bits)
    ; Standard C/System headers
    ; The next line is for intrinsics
    -isystem /usr/lib/gcc-cross/x86_64-linux-gnu/14/include
    -isystem /usr/x86_64-linux-gnu/include/c++/14
    -isystem /usr/x86_64-linux-gnu/include/c++/14/x86_64-linux-gnu
    -isystem /usr/x86_64-linux-gnu/include
    --sysroot=/usr/x86_64-linux-gnu
    ; -isystem /usr/include/x86_64-linux-gnu/c++/14
    ; -isystem /usr/lib/gcc/x86_64-linux-gnu/14/include
    -L/usr/x86_64-linux-gnu/lib
    -Wno-deprecated-declarations
    -g
    -std=c++20
    -IFluidNC/posix
    -IFluidNC/capture
    -lpthread
    -DARDUINO
    -DHOST
    -DMCU=\"posix\"
    -DVARIANT=\"capture\"
    -DSKIP_HARDWARE_SETUP=ON
    -I.pio/libdeps/linux_x86/Arduino-Emulator/ArduinoCore-API
    -I.pio/libdeps/linux_x86/Arduino-Emulator/ArduinoCore-API/api/deprecated
    -I.pio/libdeps/linux_x86/Arduino-Emulator/ArduinoCore-Linux/cores/arduino/
