name: FluidNC Continuous Integration
on:
  pull_request:
  push:
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            pio_env: wifi
            pio_env_variant: ""
            mcu: esp32
          - os: ubuntu-latest
            pio_env: wifi
            pio_env_variant: "_s3"
            mcu: esp32s3
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}
      - name: Build target ${{ matrix.pio_env }}${{ matrix.pio_env_variant }}
        run: pio run -e ${{ matrix.pio_env }}${{ matrix.pio_env_variant }}
      - if: matrix.os == 'ubuntu-latest'
        name: Generate .addrinfo for ${{ matrix.pio_env }}${{ matrix.pio_env_variant }}
        run: |
          python tools/stack_trace_decoder/generate_addrinfo.py \
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.elf \
            -o .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.addrinfo \
            --mcu ${{ matrix.mcu }} \
            --build ${{ matrix.pio_env }}${{ matrix.pio_env_variant }} \
            --verbose
      - if: matrix.os == 'ubuntu-latest'
        name: Upload ${{ matrix.pio_env }}${{ matrix.pio_env_variant }} firmware.bin
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pio_env }}${{ matrix.pio_env_variant }}_firmware
          path: |
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.*
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/partitions.bin

  tests:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            pio_env: tests
          - os: macos-latest
            pio_env: tests
          - os: windows-latest
            pio_env: tests
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      # Windows has issues running gtest code with the included gcc, so install
      # MSYS2 and use that instead (remember to add it to the path)
      - if: matrix.os == 'windows-latest'
        name: Install MSYS2 (Windows)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          location: D:\
          install: mingw-w64-ucrt-x86_64-gcc
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}

      # Separate run task for Windows, since it has issues with the included gcc
      - if: matrix.os == 'windows-latest'
        name: Run tests (Windows)
        run: |
          $env:PATH = "D:\msys64\mingw64\bin;D:\msys64\usr\bin;D:\msys64\ucrt64\bin;" + $env:PATH
          pio test -e ${{ matrix.pio_env }} -vv
      - if: matrix.os != 'windows-latest'
        name: Run tests
        run: pio test -e ${{ matrix.pio_env }} -vv

  asan_host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}
      - name: Run ASan unit tests
        run: |
          set -euo pipefail
          pio test -e tests_asan -vv
      - name: Run ASan machine-bus integration suite
        run: |
          set -euo pipefail
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 pio test -e integration_asan -f test_integration_machine_buses -vv

  integration_host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}
      - name: Run integration suites
        run: |
          set -euo pipefail
          pio test -e integration -vv --junit-output-path integration-junit.xml
      - name: Upload integration JUnit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-junit
          path: integration-junit.xml

  coverage_guard_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"
      - name: Install test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run coverage guard self-tests
        run: |
          set -euo pipefail
          python -m unittest discover -s tools -p "test_coverage_guard.py" -v
      - name: Run build manifest self-tests
        run: |
          set -euo pipefail
          python -m unittest discover -s tools -p "test_build_manifests.py" -v

  coverage_reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"
      - name: Install coverage dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install gcovr
      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}
      - name: Generate coverage reports
        run: |
          set -euo pipefail
          python coverage.py
          test -f coverage-summary.json
          test -f coverage-gaps.json
      - name: Enforce coverage guardrails
        run: |
          set -euo pipefail
          python tools/coverage_guard.py --summary coverage-summary.json --gaps coverage-gaps.json
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.txt
            coverage-branches.txt
            coverage-summary.json
            coverage-gaps.json

  posix_host_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}
      - name: Build host posix target
        run: pio run -e posix
